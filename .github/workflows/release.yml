name: Build and Release IGRA Foundry

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: igra-foundry-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: igra-foundry-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: igra-foundry-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: igra-foundry-x86_64-pc-windows-msvc.zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone repos
        run: |
          git clone https://github.com/IgraLabs/rusty-kaspa.git
          git clone https://github.com/IgraLabs/kaswallet.git
          git clone -b roman/kaspa-igra-support https://github.com/IgraLabs/foundry.git

      - name: Build
        working-directory: foundry
        run: cargo build -p cast -p forge --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp foundry/target/${{ matrix.target }}/release/cast dist/igra-cast
          cp foundry/target/${{ matrix.target }}/release/forge dist/igra-forge
          chmod +x dist/igra-cast dist/igra-forge
          cd dist && tar -czf ../${{ matrix.asset }} igra-cast igra-forge

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item foundry/target/${{ matrix.target }}/release/cast.exe dist/igra-cast.exe
          Copy-Item foundry/target/${{ matrix.target }}/release/forge.exe dist/igra-forge.exe
          Compress-Archive -Path dist/igra-cast.exe, dist/igra-forge.exe -DestinationPath ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: IGRA Foundry ${{ inputs.tag }}
          body: |
            Pre-built `igra-cast` and `igra-forge` binaries for IGRA Network.

            ## Install

            ```bash
            curl -L https://raw.githubusercontent.com/emdin/igra-foundry-sdk/main/igraup/install | bash
            source ~/.zshenv
            igraup
            ```

            ## Platforms

            | Platform | Asset |
            |----------|-------|
            | Linux x86_64 | `igra-foundry-x86_64-unknown-linux-gnu.tar.gz` |
            | macOS ARM64 (Apple Silicon) | `igra-foundry-aarch64-apple-darwin.tar.gz` |
            | macOS x86_64 (Intel) | `igra-foundry-x86_64-apple-darwin.tar.gz` |
            | Windows x86_64 | `igra-foundry-x86_64-pc-windows-msvc.zip` |
          files: artifacts/**/*
          fail_on_unmatched_files: false
